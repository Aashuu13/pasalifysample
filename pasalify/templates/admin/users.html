{% extends "admin/base_admin.html" %}
{% block title %}Users — Pasalify{% endblock %}
{% block admin_content %}
<h2>👥 Users</h2>
<table class="table">
    <thead>
        <tr>
            <th>Name</th><th>Email</th>
            <th>Role</th><th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.name }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.role }}</td>
            <td>
                {% if u.role != "admin" %}
                <form method="POST"
                      action="{{ url_for('admin.delete_user',
                                        uid=u.id) }}">
                    <input type="hidden" name="csrf_token"
                           value="{{ csrf_token() }}"/>
                    <button class="btn btn-sm btn-danger">Delete</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
