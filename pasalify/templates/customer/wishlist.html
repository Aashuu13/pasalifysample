{% extends "base.html" %}
{% block title %}Wishlist — Pasalify{% endblock %}
{% block content %}
<h2>♥ My Wishlist</h2>
{% if items %}
<div class="product-grid">
    {% for p in items %}
    <div class="product-card">
        <h3>{{ p.name }}</h3>
        <p class="price">Rs. {{ p.price }}</p>
        <p>{{ p.category }}</p>
        <a href="{{ url_for('customer.product_detail', pid=p.id) }}"
           class="btn btn-sm">View</a>
        <form method="POST"
              action="{{ url_for('customer.toggle_wishlist', pid=p.id) }}">
            <input type="hidden" name="csrf_token"
                   value="{{ csrf_token() }}"/>
            <button class="btn btn-sm btn-danger">Remove</button>
        </form>
    </div>
    {% endfor %}
</div>
{% else %}
<p>Your wishlist is empty.</p>
{% endif %}
{% endblock %}
